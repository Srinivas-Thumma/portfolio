<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark navy background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#050d1a"/>
  <!-- Terminal border glow -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
  <!-- Prompt > -->
  <text x="2" y="19" font-family="monospace" font-size="10" fill="#22d3ee" font-weight="bold">&gt;</text>
  <!-- ST -->
  <text x="11" y="19" font-family="monospace" font-size="10" fill="#f0f6ff" font-weight="bold">ST</text>
  <!-- Blinking cursor block -->
  <rect x="27" y="10" width="3" height="8" fill="#22d3ee" opacity="0.9" rx="1">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
