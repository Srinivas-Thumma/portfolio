<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark navy background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#050d1a"/>
  <!-- Terminal border glow -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <!-- Prompt > -->
  <text x="3" y="14" font-family="monospace" font-size="7" fill="#22d3ee" font-weight="bold">&#x3E;</text>
  <!-- ST -->
  <text x="9" y="14" font-family="monospace" font-size="7" fill="#f0f6ff" font-weight="bold">ST</text>
  <!-- Cursor _ blinking line -->
  <rect x="22" y="9" width="5" height="1.5" fill="#22d3ee" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- bottom decoration line -->
  <line x1="3" y1="20" x2="29" y2="20" stroke="#1e3a6e" stroke-width="0.8"/>
  <!-- dot indicators like terminal buttons -->
  <circle cx="6" cy="24.5" r="1.5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="11" cy="24.5" r="1.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="16" cy="24.5" r="1.5" fill="#60a5fa" opacity="0.3"/>
</svg>
